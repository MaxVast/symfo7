version: '3.8'

services:
  php-fpm:
    image: ghcr.io/maxvast/dev-php8.4fpm:latest
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: php_fpm
    environment:
      APP_ENV: prod
      APP_DEBUG: 0
    volumes:
      - var_log:/var/www/var:rw

  nginx:
    image: ghcr.io/maxvast/dev-nginx:latest
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      target: nginx
    environment:
      FPM_ENTRYPOINT: index
      PHP_FPM_CONTAINER: php-fpm
      NGINX_PROJECT: local
      NGINX_HOST: symfo7.fr
      NGINX_ROOT_DIR: public
    ports:
      # HTTP
      - target: 80
        published: 80
        protocol: tcp
      # HTTPS
      - target: 443
        published: 443
        protocol: tcp
    depends_on:
      - php-fpm

volumes:
  var_log: